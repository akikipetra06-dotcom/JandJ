<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&J Petro Station/Coffee Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #c69c6d;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: white;
            padding-bottom: 120px;
            overflow-x: hidden;
        }

        /* --- ENTRANCE ANIMATIONS --- */
        @keyframes floatInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateLogo {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Initial state for elements before loader finishes */
        .hero, .section-title, .grid a, .logo-container {
            opacity: 0;
        }

        /* State after page is 'loaded' */
        .loaded .hero { animation: floatInDown 0.8s ease-out forwards; }
        .loaded .section-title, .loaded .grid a { animation: floatInUp 0.8s ease-out forwards; }
        .loaded .logo-container { opacity: 1; transition: opacity 0.5s ease; }

        /* --- LOADER --- */
        #loader {
            position: fixed;
            inset: 0;
            background: black;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }

        #loader img {
            width: 100px;
            height: auto;
            animation: rotateLogo 2s linear infinite; /* Smooth continuous rotation */
        }

        /* --- LOGO POSITIONING --- */
        .logo-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .logo-container img {
            width: 65px;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 45vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--dark)), 
                        url('image.jpeg') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 { font-size: 2.8rem; margin: 0; }
        .hero p {
            color: var(--primary);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            font-size: 0.9rem;
        }

        .section-title {
            text-align: center;
            margin: 30px 0 15px;
            font-weight: 400;
            color: #888;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* --- GRID & CARDS --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 20px;
        }

        .grid a { text-decoration: none; color: inherit; }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 25px 15px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card i { color: var(--primary); margin-bottom: 8px; width: 28px; height: 28px; }

        .card:hover {
            background: rgba(198, 156, 106, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(198, 156, 109, 0.4);
        }

        /* --- PROMO CARD (COFFEE) --- */
        .promo-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1a1a1a, #000);
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .promo-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(198, 156, 109, 0.5);
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        /* --- STEAM ANIMATION --- */
        .coffee-icon-container {
            position: relative;
            font-size: 2.5rem;
        }

        .steam {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 3px;
            color: rgba(255, 255, 255, 0.3);
        }

        .steam span { animation: steamRise 2s infinite ease-out; opacity: 0; }
        .steam span:nth-child(2) { animation-delay: 0.4s; }
        .steam span:nth-child(3) { animation-delay: 0.8s; }

        @keyframes steamRise {
            0% { transform: translateY(5px) scale(1); opacity: 0; }
            30% { opacity: 0.8; }
            100% { transform: translateY(-25px) scale(1.5); opacity: 0; }
        }

        /* --- BOTTOM NAV --- */
        .nav {
            position: fixed;
            bottom: 20px; left: 20px; right: 20px;
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            z-index: 1000;
        }

        .nav a {
            color: #666;
            text-decoration: none;
            font-size: 0.7rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .nav a.active { color: var(--primary); }
        .nav i { margin-bottom: 4px; width: 20px; height: 20px; }

    </style>
</head>
<body>

    <div id="loader">
        <img src="logo.png" alt="Loading...">
    </div>

    <div class="logo-container">
        <img src="logo.png" alt="J&J Petro Station Logo">
    </div>

    <header class="hero">
        <h1>J&J Petro Station</h1>
        <p>EV Charge, Premium Fuel & Service</p>
    </header>

    <h3 class="section-title">OUR SERVICES</h3>

    <div class="grid">
        <a href="fuel.html" style="animation-delay: 0.1s">
            <div class="card"><i data-feather="droplet"></i><div>Fuel</div></div>
        </a>
        <a href="carwash.html" style="animation-delay: 0.2s">
            <div class="card"><i data-feather="shield"></i><div>Wash</div></div>
        </a>
        <a href="carpetwash.html" style="animation-delay: 0.3s">
            <div class="card"><i data-feather="shield"></i><div>Carpet Wash</div></div>
        </a>
        <a href="tires.html" style="animation-delay: 0.4s">
            <div class="card"><i data-feather="wind"></i><div>Tires</div></div>
        </a>
        <a href="ev.html" style="animation-delay: 0.5s">
            <div class="card"><i data-feather="zap"></i><div>EV</div></div>
        </a>
        <a href="oil.html" style="animation-delay: 0.6s">
            <div class="card"><i data-feather="droplet"></i><div>Oil</div></div>
        </a>
        <a href="diesel.html" style="animation-delay: 0.7s">
            <div class="card"><i data-feather="zap"></i><div>Diesel</div></div>
        </a>

        <a href="J&JCoffeeShop.html" class="promo-card" style="animation-delay: 0.8s">
            <div>
                <h3 style="margin:0">J&J Coffee Shop</h3>
                <p style="font-size:0.7rem; color:#888; margin-bottom: 8px;">Freshly brewed for you</p>
                <span class="btn">View Menu</span>
            </div>
            <div class="coffee-icon-container">
                <div class="steam"><span>~</span><span>~</span><span>~</span></div>
                <span>☕</span>
            </div>
        </a>
    </div>

    <nav class="nav">
        <a href="J&JPetroStation.html" class="active"><i data-feather="home"></i>Home</a>
        <a href="J&JCoffeeShop.html"><i data-feather="coffee"></i>Coffee</a>
        <a href="https://maps.google.com" target="_blank"><i data-feather="map-pin"></i>Map</a>
        <a href="contactus.html"><i data-feather="message-circle"></i>Contact Us</a>
    </nav>

    <script>
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            
            // 1. Hide the loader
            loader.style.opacity = '0';
            
            // 2. Trigger animations by adding 'loaded' class to body
            document.body.classList.add('loaded');

            // 3. Remove loader completely after transition
            setTimeout(() => {
                loader.style.display = 'none';
            }, 600);
        });

        // Initialize feather icons
        feather.replace();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diesel Order | J&J Petro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #c69c6d;
            --dark: #0a0a0a;
            --card-bg: #151515;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--dark);
            color: white;
            padding-bottom: 200px;
        }

        /* HEADER & SLIDER SECTION */
        .header-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(to bottom, transparent, var(--dark)), 
                        url('https://images.unsplash.com/photo-1563906267088-b029e7101114?q=80&w=1000');
            background-size: cover;
            background-position: center;
        }

        .back-btn {
            position: absolute; 
            top: 20px; 
            left: 20px;
            background: rgba(0,0,0,0.6); 
            color: white;
            padding: 10px; 
            border-radius: 50%; 
            z-index: 10; 
            display: flex;
        }

        .container { 
            padding: 20px; 
        }

        .service-title { 
            margin-top: -50px; 
            position: relative; 
        }
        .service-title h1 { 
            font-size: 2rem; 
            margin: 0; 
        }
        .service-title p { 
            color: var(--primary); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            margin: 5px 0; 
        }

        /* DIESEL ITEM DESIGN */
        .diesel-item {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .price-tag {
            font-size: 2.5rem;
            font-weight: 600;
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
        }
        .price-tag span { 
            font-size: 1rem; 
            color: #666; 
        }

        /* QUANTITY SELECTOR */
        .qty-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 20px 0;
        }

        .qty-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            width: 50px; height: 50px;
            border-radius: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .qty-btn:active { 
            transform: scale(0.9); 
            background: var(--primary); 
            color: black; 
        }

        #qtyDisplay { 
            font-size: 2rem; 
            font-weight: 600; 
            min-width: 60px; 
            text-align: center; 
        }

        /* ORDER DETAILS FORM */
        .input-group {
            margin-top: 25px;
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
        }
        .input-group label {
             display: block; 
             font-size: 0.75rem; 
             color: #888; 
             margin-bottom: 5px; 
        }

        .input-group input {
            width: 100%; 
            background: transparent; 
            border: none;
            color: white; 
            font-family: inherit; 
            font-size: 1rem; 
            outline: none;
        }

        /* THE BAR */
        .order-action-bar {
            position: fixed; 
            bottom: 100px; 
            left: 15px; 
            right: 15px;
            background: var(--primary); 
            padding: 12px 15px;
            border-radius: 18px; 
            display: flex; 
            justify-content: space-between; /* Pushes Qty to left, Buttons to right */
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1001; 
            transform: translateY(250px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
        }

        /* THE BUTTON GROUP CONTAINER */
        .action-btns {
            display: flex;
            gap: 10px; /* Space between Clear and Order buttons */
        }

        .confirm-btn {
            background: black; 
            color: white; 
            border: none; 
            padding: 10px 15px; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer; 
        }

        .clear-btn {
            background: #8b0000; /* Dark Red */
            color: white; 
            border: none;
            padding: 10px 15px; 
            border-radius: 12px; 
            font-weight: 600; 
            cursor: pointer;
        }

        .order-action-bar > div:last-child {
            display: flex;
            gap: 8px;
        }

        .order-action-bar.visible { 
            transform: translateY(0); 
            visibility: visible;  
        }
        /* Removes the default arrows from the number input for a cleaner look */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        /* NAV STYLE */
        .nav {
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            right: 20px;
            background: rgba(20,20,20,0.9); 
            backdrop-filter: blur(10px);
            display: flex; 
            justify-content: space-around; 
            padding: 15px 0;
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000;
        }
        .nav a { 
            color: #555; 
            text-decoration: none; 
            font-size: 0.7rem; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .nav a.active { 
            color: var(--primary); 
        }
        /* Engine Vibrate Animation */
@keyframes truck-engine {
    0% { transform: translate(0, 0); }
    25% { transform: translate(1px, 1px); }
    50% { transform: translate(-1px, -1px); }
    75% { transform: translate(1px, -1px); }
    100% { transform: translate(0, 0); }
}

#truckIcon {
    animation: truck-engine 0.2s infinite;
}

/* Popup Visibility Classes */
#dieselSuccessPopup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.92);
    z-index: 3000;
    display: none; /* Keep this as none by default */
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    transition: opacity 0.4s ease;
}

#dieselSuccessPopup.active {
    display: flex !important;
    opacity: 1;
}

#dieselSuccessPopup.active #dieselPopupContent {
    transform: translateY(0) !important;
    opacity: 1 !important;
}
    </style>
</head>
<body>

    <a href="J&JPetroStation.html" class="back-btn"><i data-feather="arrow-left"></i></a>

    <div class="header-image"></div>

    <div class="container">
        <div class="service-title">
            <p>Refuel Anywhere</p>
            <h1>Diesel Distribution</h1>
        </div>

        <div class="diesel-item">
            <div class="price-tag" id="totalPrice">$0.00 <span>Total</span></div>
            <p style="text-align: center; color: #888; margin: 0;">Set Quantity (Liter)</p>
        <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(-1)">-</button>
    
            <input type="number" id="qtyInput" value="0" min="0" oninput="manualInput()" style="background: transparent; border: 1px solid rgba(255,255,255,0.1); 
                  color: white; font-size: 2rem; font-weight: 600; width: 120px; text-align: center; border-radius: 10px; outline: none;">
                  
            <button class="qty-btn" onclick="updateQty(1)">+</button>
        </div>

            <div class="input-group">
                <label>Delivery Address / Location</label>
                <input type="text" id="deliveryLoc" placeholder="e.g. 123 Street Name">
            </div>

            <div class="input-group">
                <label>Receiver Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g. 70123456 or +961...">
            </div>

            <div class="input-group">
    <label>Google Maps Location</label>
    <div style="display: flex; gap: 10px; align-items: center;">
        <input type="url" id="locmap" placeholder="Paste link or click pin">
        <button type="button" onclick="getLocation()" style="background: var(--primary); border: none; border-radius: 10px; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
            <i data-feather="map-pin" style="color: black; width: 20px; height: 20px;"></i>
        </button>
    </div>
    <small id="locationStatus" style="font-size: 0.65rem; color: #888; margin-top: 5px; display: block;">
        Paste a Google Maps link OR tap the pin for GPS
    </small>
</div>
        </div>
    </div>

    <div id="orderBar" class="order-action-bar">
        <div>
            <span id="finalQty">0 L</span>
        </div>
        <div>
            <button class="clear-btn"   onclick="clearCart()">Clear Order</button>
            <button class="confirm-btn" onclick="sendDieselOrder()">Order Now</button>
        </div>
    </div>

    <nav class="nav">
        <a href="J&JPetroStation.html"><i data-feather="home"></i>Home</a>
        <a href="J&JCoffeeShop.html"><i data-feather="coffee"></i>Coffee</a>
        <a href="https://www.google.com/maps/search/?api=1&query=J%26J+Petro+Station" target="_blank"><i data-feather="map-pin"></i>Map</a>
        <a href="contactus.html"><i data-feather="message-circle"></i>Contact Us</a>
    </nav>
    <div id="dieselSuccessPopup" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
    <div id="dieselPopupContent" style="background: #151515; padding: 50px 30px; border-radius: 30px; border: 1px solid #c69c6d; text-align: center; width: 85%; max-width: 400px; transform: translateY(50px); opacity: 0; transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);">
        
        <div style="width: 100px; height: 100px; background: rgba(198, 156, 109, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; border: 2px solid #c69c6d; position: relative;">
            <i data-feather="truck" id="truckIcon" style="color: #c69c6d; width: 50px; height: 50px;"></i>
            <div style="position: absolute; bottom: 0; right: 0; background: #25D366; border-radius: 50%; padding: 5px; border: 3px solid #151515;">
                <i data-feather="check" style="color: white; width: 15px; height: 15px;"></i>
            </div>
        </div>

        <h2 style="margin: 0; color: white; letter-spacing: 1px;">Request Received!</h2>
        <p style="color: #888; margin: 15px 0 30px; line-height: 1.5;">Your diesel delivery is being scheduled. We will contact you shortly via WhatsApp.</p>
        
        <button onclick="closeDieselPopup()" style="width: 100%; background: #c69c6d; color: black; border: none; padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;">Got it</button>
    </div>
</div>
    <script>
    feather.replace();

    let quantity = 0;
    const pricePerUnit = 1.365; // Change your diesel price here

    function updateQty(amt) {
        quantity = Math.max(0, quantity + amt);
        document.getElementById('qtyInput').value = quantity;
        calculateTotal();
    }

    function manualInput() {
        let val = document.getElementById('qtyInput').value;
        quantity = parseFloat(val) || 0;
        if (quantity < 0) quantity = 0;
        calculateTotal();
    }

    function sendDieselOrder() {
        const locInput = document.getElementById('deliveryLoc');
        const mapInput = document.getElementById('locmap');
        const phoneInput = document.getElementById('phone');
        
        const loc = locInput.value.trim();
        const map = mapInput.value.trim();
        const rphone = phoneInput.value.trim();
        
        const Phone = "96103358831";
        const total = (quantity * pricePerUnit).toFixed(2);

        // Validation
        if (quantity <= 0) {
            alert("Please set a quantity.");
            return;
        }
        if (loc.length < 5) {
            alert("Please enter a delivery address.");
            locInput.focus();
            return;
        }
        const phonePattern = /^\+?[0-9]{7,15}$/;
        if (!phonePattern.test(rphone)) {
            alert("Please enter a valid phone number.");
            phoneInput.focus();
            return;
        }
        const mapPattern = /^(https?:\/\/)?(www\.)?(google\.com\/maps|maps\.app\.goo\.gl|goo\.gl\/maps)\/.+$/;
        if (!mapPattern.test(map)) {
            alert("Please enter a valid Google Maps link or use the GPS pin.");
            mapInput.focus();
            return;
        }

        const message = `⛽ *Diesel Delivery Order* \n\n` +
                      `• *Quantity:* ${quantity} L\n` +
                      `• *Total Price:* $${total}\n\n` +
                      `📍 *Address:* ${loc}\n` +
                      `🗺️ *Map:* ${map}\n` +
                      `📞 *Receiver:* ${rphone}\n\n` +
                      `_Sent from J&J Petro Website_`;

        showDieselSuccess();

        setTimeout(() => {
            window.open(`https://wa.me/${Phone}?text=${encodeURIComponent(message)}`, "_blank");
        }, 500); 
    }

    function showDieselSuccess() {
        const popup = document.getElementById('dieselSuccessPopup');
        popup.style.display = 'flex'; 
        setTimeout(() => {
            popup.classList.add('active');
        }, 10);
        feather.replace(); 
    }

    function closeDieselPopup() {
        const popup = document.getElementById('dieselSuccessPopup');
        popup.classList.remove('active');
        setTimeout(() => {
            popup.style.display = 'none';
            quantity = 0;
            document.getElementById('qtyInput').value = 0;
            document.getElementById('deliveryLoc').value = "";
            document.getElementById('locmap').value = "";
            document.getElementById('phone').value = "";
            calculateTotal();
        }, 400);
    }

    function clearCart() {
        if (confirm("Are you sure you want to clear this order?")) {
            quantity = 0;
            document.getElementById('qtyInput').value = 0;
            document.getElementById('deliveryLoc').value = "";
            document.getElementById('locmap').value = "";
            document.getElementById('phone').value = "";
            calculateTotal();
        }
    }

    function calculateTotal() {
        const total = (quantity * pricePerUnit).toFixed(2);
        document.getElementById('totalPrice').innerHTML = `$${total} <span>Total</span>`;
        document.getElementById('finalQty').innerText = quantity + " Liters";

        const bar = document.getElementById('orderBar');
        if (quantity > 0) {
            bar.classList.add('visible');
        } else {
            bar.classList.remove('visible');
        }
    }

    function getLocation() {
    const status = document.getElementById('locationStatus');
    const mapInput = document.getElementById('locmap');

    if (!navigator.geolocation) {
        status.textContent = "Geolocation not supported.";
        return;
    }

    status.textContent = "Locating...";
    status.style.color = "#c69c6d";

    navigator.geolocation.getCurrentPosition(
        (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            
            // THE NEW FIX: Use the official Google Maps search URL
            // This link works perfectly on all phones and computers
            const mapLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
            
            mapInput.value = mapLink;
            status.textContent = "GPS Location added!";
            status.style.color = "#25D366"; 
        },
        (error) => {
            status.textContent = "Error: Check GPS permissions.";
            status.style.color = "#ff4444";
        },
        { enableHighAccuracy: true }
    );
}
</script>
</body>
</html>

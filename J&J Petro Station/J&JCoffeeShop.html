<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J&J Coffee Shop | Order Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root {
            --primary: #c69c6d;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: white;
            padding-bottom: 280px; 
        }

        .header { 
            padding: 40px 20px;
            background: linear-gradient(to bottom, #111, var(--dark-bg)); 
        }
        .header p { 
            color: var(--primary); 
            margin: 0; 
            font-weight: 300; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
        }
        .header h1 { 
            font-size: 2.2rem; 
            margin: 5px 0 0; 
        }

        .menu-grid {
            padding: 0 15px;
            display: grid;
            gap: 12px;
            grid-template-columns: repeat(2, 1fr);
        }

        @media (min-width: 600px) { 
            .menu-grid { 
                grid-template-columns: repeat(3, 1fr); 
                padding: 0 40px; 
            } 
        }
        @media (min-width: 1000px) { 
            .menu-grid { 
                grid-template-columns: repeat(4, 1fr); 
                max-width: 1200px; 
                margin: 0 auto; 
            } 
        }

        .coffee-card {
            background: #151515;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }

        .coffee-card img { 
            width: 100%; 
            height: 110px; 
            object-fit: cover; 
        }
        .coffee-info { 
            padding: 12px; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
        }
        .coffee-info h3 { 
            margin: 0; 
            font-size: 0.85rem; 
            font-weight: 400; 
            height: 38px; 
        }
        .coffee-info .price { 
            font-size: 1rem; 
            color: var(--primary); 
            font-weight: 600; 
        }

        .add-btn {
            background: var(--glass);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
        }

        /* CART BAR */
        .cart-bar {
            position: fixed; 
            bottom: 95px; 
            left: 15px; 
            right: 15px;
            background: var(--primary); 
            color: black; 
            padding: 10px 15px;
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1001; 
            transform: translateY(250px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
        }
        .cart-bar.active { 
            transform: translateY(0); 
            visibility: visible; 
        }
        .cart-bar h4 { 
            margin: 0; 
            font-size: 0.8rem; 
        }
        .view-btn { 
            background: black; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
        }

        /* OVERLAY */
        .order-overlay {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 70vh;
            background: #151515; 
            border-top: 2px solid var(--primary);
            border-radius: 30px 30px 0 0; 
            z-index: 2000; 
            padding: 20px;
            transform: translateY(100%); 
            transition: transform 0.4s ease;
            display: flex; 
            flex-direction: column;
        }
        .order-overlay.open { 
            transform: translateY(0); 
        }
        .overlay-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px; 
        }
        .order-list { 
            flex-grow: 1; 
            overflow-y: auto; 
        }
        .order-item-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .item-controls { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .qty-btn { 
            background: var(--glass); 
            border: 1px solid var(--primary); 
            color: var(--primary); 
            border-radius: 5px; 
            width: 30px; 
            height: 30px; 
        }
        .whatsapp-btn { 
            width: 100%; 
            background: #25D366; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: 600; 
            margin-top: 10px; 
            cursor: pointer; 
        }

        .nav {
            position: fixed; 
            bottom: 20px; 
            left: 20px; 
            right: 20px;
            background: rgba(15,15,15,0.9); 
            backdrop-filter: blur(15px);
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0;
            border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); 
            z-index: 1000;
        }
        .nav a { 
            color: #666; 
            text-decoration: none; 
            text-align: center; 
            font-size: 0.7rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .nav a.active { 
            color: var(--primary); 
        }
    </style>
</head>
<body>

    <div class="header">
        <p>Order Online</p>
        <h1>J&J Coffee Shop</h1>
    </div>

    <div class="menu-grid">
        <div class="coffee-card">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&q=80">
            <div class="coffee-info">
                <h3>Signature Latte</h3>
                <div class="price">$3.50</div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button class="add-btn" style="flex: 2;" onclick="addToCart('Signature Latte', 3.50)">Add</button>
                    <button class="add-btn" style="flex: 1; border-color: #ff4444; color: #ff4444;" onclick="removeFromCart('Signature Latte', 3.50)">-</button>
                </div>
             </div>
        </div>

        <div class="coffee-card">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&q=80">
            <div class="coffee-info">
                <h3>Iced Americano</h3>
                <div class="price">$3.00</div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button class="add-btn" style="flex: 2;" onclick="addToCart('Iced Americano', 3.00)">Add</button>
                    <button class="add-btn" style="flex: 1; border-color: #ff4444; color: #ff4444;" onclick="removeFromCart('Iced Americano', 3.00)">-</button>
                </div>
            </div>
        </div>

        <div class="coffee-card">
            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&q=80">
            <div class="coffee-info">
                <h3>Cappuccino</h3>
                <div class="price">$3.25</div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button class="add-btn" style="flex: 2;" onclick="addToCart('Cappuccino', 3.25)">Add</button>
                    <button class="add-btn" style="flex: 1; border-color: #ff4444; color: #ff4444;" onclick="removeFromCart('Cappuccino', 3.25)">-</button>
                </div>            
            </div>
        </div>

        <div class="coffee-card">
            <img src="https://images.unsplash.com/photo-1559496417-e7f25cb247f3?auto=format&fit=crop&q=80">
            <div class="coffee-info">
                <h3>Double Espresso</h3>
                <div class="price">$2.50</div>
                <div style="display: flex; gap: 5px; margin-top: 10px;">
                    <button class="add-btn" style="flex: 2;" onclick="addToCart('Double Espresso', 2.50)">Add</button>
                    <button class="add-btn" style="flex: 1; border-color: #ff4444; color: #ff4444;" onclick="removeFromCart('Double Espresso', 2.50)">-</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartBar" class="cart-bar">
        <div style="flex-grow: 1;">
            <h4 id="cartCount">0 Items</h4>
            <strong id="cartTotal">$0.00</strong>
        </div>
        <div>
            <button class="view-btn" onclick="toggleOverlay()">View Order</button>
            <button onclick="clearCart()" style="background:#ff4444; border:none; color:white; padding:8px 15px; border-radius:8px; margin-right:10px; cursor:pointer;font-weight: 600; ">Clear Order</button>
        </div>
    </div>

    <div id="orderOverlay" class="order-overlay">
        <div class="overlay-header">
            <h3>Your Order</h3>
            <div>
                <button onclick="clearCart()" style="background:none; border:1px solid #ff4444; color:#ff4444; padding:4px 8px; border-radius:5px; font-size:0.7rem; margin-right:10px; cursor:pointer;">Clear Order</button>
                <button onclick="toggleOverlay()" style="background:none; border:none; color:white;"><i data-feather="x"></i></button>
            </div>
        </div>
        <div id="orderList" class="order-list"></div>
        <div class="overlay-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="overlayTotal">$0.00</span>
            </div>
            <div>
                <button class="whatsapp-btn" onclick="sendOrder()">Confirm & Send Order</button>
            </div>
            </div>
    </div>

    <nav class="nav">
        <a href="J&JPetroStation.html"><i data-feather="home"></i>Home</a>
        <a href="J&JCoffeeShop.html" class="active"><i data-feather="coffee"></i>Coffee</a>
        <a href="https://maps.app.goo.gl/KT3dtvv9DXUvMYA17" target="_blank"><i data-feather="map-pin"></i>Map</a>
        <a href="https://wa.me/96103358831"><i data-feather="message-circle"></i>Chat</a>
    </nav>

    <script>
        // MUST BE AT THE TOP OF SCRIPT
        feather.replace();

        let cart = {};
        let total = 0;

        function toggleOverlay() {
            document.getElementById('orderOverlay').classList.toggle('open');
            renderOrderList();
        }

        function addToCart(name, price) {
            if (cart[name]) { cart[name].qty += 1; } 
            else { cart[name] = { price: price, qty: 1 }; }
            total += price;
            updateCartUI();
            renderOrderList();
        }

        function removeFromCart(name, price) {
            if (cart[name] && cart[name].qty > 0) {
                cart[name].qty -= 1;
                total -= price;
                if (cart[name].qty === 0) { delete cart[name]; }
                updateCartUI();
                renderOrderList();
            }
        }

        function updateCartUI() {
            const bar = document.getElementById('cartBar');
            let itemCount = 0;
            for (let item in cart) { itemCount += cart[item].qty; }

            if (itemCount > 0) {
                bar.classList.add('active');
                document.getElementById('cartCount').innerText = itemCount + " Items";
                document.getElementById('cartTotal').innerText = "$" + Math.max(0, total).toFixed(2);
            } else {
                bar.classList.remove('active');
                document.getElementById('orderOverlay').classList.remove('open');
            }
        }

        function renderOrderList() {
            const listContainer = document.getElementById('orderList');
            listContainer.innerHTML = '';
            for (let name in cart) {
                const item = cart[name];
                const row = document.createElement('div');
                row.className = 'order-item-row';
                row.innerHTML = `
                    <div>
                        <div style="font-weight:600">${name}</div>
                        <div style="color:var(--primary); font-size:0.8rem">$${(item.qty * item.price).toFixed(2)}</div>
                    </div>
                    <div class="item-controls">
                        <button class="qty-btn" onclick="removeFromCart('${name}', ${item.price})">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="addToCart('${name}', ${item.price})">+</button>
                    </div>
                `;
                listContainer.appendChild(row);
            }
            document.getElementById('overlayTotal').innerText = "$" + Math.max(0, total).toFixed(2);
        }

        function clearCart() {
            if (confirm("Are you sure you want to clear your entire order?")) {
                cart = {};
                total = 0;
                updateCartUI(); // This will hide the gold bar since itemCount is 0
                renderOrderList(); // This clears the list inside the overlay
            }
        }

        function sendOrder() {
            const phoneNumber = "96103358831";
            let message = "*Order to J&J Coffee Shop!* \n\n";
            for (let name in cart) {
                message += "• " + cart[name].qty + "x " + name + " ($" + (cart[name].qty * cart[name].price).toFixed(2) + ")\n";
            }
            message += "\n💰 *Total: $" + total.toFixed(2) + "*";
            window.open("https://wa.me/" + phoneNumber + "?text=" + encodeURIComponent(message), "_blank");
        }
    </script>
</body>
</html>
